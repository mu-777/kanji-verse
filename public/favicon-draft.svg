<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a0b4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#05050f" stop-opacity="0"/>
    </radialGradient>
    <filter id="star-glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="line-glow">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" fill="#05050f" rx="8"/>

  <!-- Subtle background glow -->
  <circle cx="32" cy="32" r="28" fill="url(#glow)"/>

  <!-- 「星」constellation lines (connecting stroke endpoints) -->
  <g stroke="#7088cc" stroke-width="0.7" stroke-opacity="0.4" filter="url(#line-glow)">
    <!-- 日 part (top) -->
    <line x1="20" y1="8" x2="44" y2="8"/>
    <line x1="44" y1="8" x2="44" y2="24"/>
    <line x1="44" y1="24" x2="20" y2="24"/>
    <line x1="20" y1="24" x2="20" y2="8"/>
    <line x1="20" y1="16" x2="44" y2="16"/>

    <!-- 生 part (bottom) -->
    <line x1="14" y1="32" x2="50" y2="32"/>
    <line x1="18" y1="40" x2="46" y2="40"/>
    <line x1="32" y1="28" x2="32" y2="58"/>
    <line x1="22" y1="48" x2="42" y2="48"/>
    <line x1="12" y1="56" x2="52" y2="56"/>
  </g>

  <!-- Star dots at vertices -->
  <g filter="url(#star-glow)">
    <!-- 日 corners and midpoints -->
    <circle cx="20" cy="8" r="2" fill="#e0e8ff"/>
    <circle cx="44" cy="8" r="2" fill="#e0e8ff"/>
    <circle cx="44" cy="16" r="1.5" fill="#c8d4ff"/>
    <circle cx="20" cy="16" r="1.5" fill="#c8d4ff"/>
    <circle cx="44" cy="24" r="2" fill="#e0e8ff"/>
    <circle cx="20" cy="24" r="2" fill="#e0e8ff"/>

    <!-- 生 vertices -->
    <circle cx="14" cy="32" r="1.5" fill="#c8d4ff"/>
    <circle cx="50" cy="32" r="2" fill="#e0e8ff"/>
    <circle cx="32" cy="28" r="1.5" fill="#c8d4ff"/>
    <circle cx="18" cy="40" r="1.5" fill="#c8d4ff"/>
    <circle cx="46" cy="40" r="1.8" fill="#e0e8ff"/>
    <circle cx="22" cy="48" r="1.5" fill="#c8d4ff"/>
    <circle cx="42" cy="48" r="1.5" fill="#c8d4ff"/>
    <circle cx="32" cy="58" r="2" fill="#e0e8ff"/>
    <circle cx="12" cy="56" r="1.8" fill="#e0e8ff"/>
    <circle cx="52" cy="56" r="1.8" fill="#e0e8ff"/>
  </g>
</svg>

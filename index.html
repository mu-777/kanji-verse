<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05050f" />
    <title>Kanji-Verse</title>
    <meta name="description" content="Thousands of Japanese kanji floating in space — similar meanings, closer together. Drift among them and see what you discover." />

    <!-- OGP -->
    <meta property="og:title" content="Kanji-Verse" />
    <meta property="og:description" content="Thousands of Japanese kanji floating in space — similar meanings, closer together. Drift among them and see what you discover." />
    <meta property="og:image" content="https://mu-777.github.io/kanji-verse/ogp.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://mu-777.github.io/kanji-verse/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kanji-Verse" />
    <meta property="og:locale" content="ja_JP" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kanji-Verse" />
    <meta name="twitter:description" content="Thousands of Japanese kanji floating in space — similar meanings, closer together. Drift among them and see what you discover." />
    <meta name="twitter:image" content="https://mu-777.github.io/kanji-verse/ogp.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { overflow: hidden; }
      body {
        background: #05050f;
        color: #e0e4ff;
        font-family: "Inter", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
        font-weight: 200;
        overflow: hidden; height: 100dvh;
      }
      /* canvas を fixed にしてドキュメントフローから切り離す。
         Three.js の renderer.setSize() がインラインスタイルで width/height を書き込むと
         iOS Safari で initial containing block の幅がずれ、fixed 要素の配置が崩れる。 */
      #canvas { display: block; position: fixed; top: 0; left: 0; }

      #search-bar {
        position: fixed; top: 20px; left: 0; right: 0;
        margin: 0 auto; width: fit-content;
        max-width: calc(100vw - 32px);
        display: flex; align-items: center; gap: 8px;
        background: rgba(10, 10, 30, 0.85);
        border: 1px solid rgba(120, 140, 255, 0.3);
        border-radius: 24px; padding: 8px 16px;
        backdrop-filter: blur(8px); z-index: 10;
      }
      #search-input {
        background: none; border: none; outline: none;
        color: #e0e4ff; font-size: 18px; width: 136px;
        text-align: center; font-family: inherit;
      }
      #search-input::placeholder { color: rgba(180, 190, 255, 0.4); font-size: 14px; }

      #filter-bar {
        position: fixed; top: 20px; right: 20px;
        display: flex; flex-direction: column; gap: 8px; z-index: 10;
      }
      .filter-btn {
        background: rgba(10, 10, 30, 0.85);
        border: 1px solid rgba(120, 140, 255, 0.3);
        border-radius: 12px; padding: 6px 12px;
        color: #e0e4ff; font-size: 12px; cursor: pointer;
        backdrop-filter: blur(8px);
        transition: border-color 0.2s, background 0.2s;
        font-family: inherit; display: flex; align-items: center; gap: 6px;
      }
      .filter-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .filter-btn.active { border-color: rgba(180, 200, 255, 0.7); }
      .filter-btn.inactive { opacity: 0.45; }

      #detail-panel {
        position: fixed; bottom: 24px; left: 0; right: 0;
        margin: 0 auto; width: fit-content;
        min-width: min(280px, calc(100vw - 32px));
        max-width: min(480px, calc(100vw - 32px));
        background: rgba(8, 8, 28, 0.92);
        border: 1px solid rgba(120, 140, 255, 0.35);
        border-radius: 16px; padding: 20px 28px;
        backdrop-filter: blur(12px); z-index: 10;
        display: none;
      }
      #detail-panel.visible { display: block; }
      #detail-kanji { font-size: 64px; line-height: 1; text-align: center; margin-bottom: 12px; letter-spacing: -2px; }
      #detail-type { text-align: center; font-size: 11px; margin-bottom: 12px; opacity: 0.6; letter-spacing: 0.05em; }
      #detail-readings { display: flex; justify-content: center; gap: 16px; margin-bottom: 10px; font-size: 13px; }
      .reading-group { text-align: center; }
      .reading-label { font-size: 10px; opacity: 0.45; letter-spacing: 0.08em; margin-bottom: 2px; }
      .reading-value { color: rgba(220, 225, 255, 0.9); }
      #detail-meanings { font-size: 13px; color: rgba(200, 210, 255, 0.85); text-align: center; line-height: 1.8; border-top: 1px solid rgba(120, 140, 255, 0.15); padding-top: 10px; }
      #detail-close { position: absolute; top: 10px; right: 14px; background: none; border: none; color: rgba(180, 190, 255, 0.5); font-size: 18px; cursor: pointer; font-family: inherit; }

      #loading {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 12px;
        font-size: 14px; color: rgba(180, 190, 255, 0.6); z-index: 100;
      }
      #loading-text {
        display: flex; align-items: baseline; gap: 8px;
      }
      #loading-percent {
        font-variant-numeric: tabular-nums;
      }
      #loading-bar-track {
        /* 幅は JS で "Loading Kanji-Verse..." の幅 × 1.5 に設定 */
        height: 2px; background: rgba(120, 140, 255, 0.15); border-radius: 1px;
        overflow: hidden;
      }
      #loading-bar-fill {
        height: 100%; width: 0%; background: rgba(120, 140, 255, 0.6);
        border-radius: 1px; transition: width 0.1s linear;
      }

      #zoom-hint { position: fixed; bottom: 20px; right: 20px; font-size: 11px; color: rgba(180, 190, 255, 0.3); z-index: 10; line-height: 1.8; text-align: right; }

      #search-count { font-size: 11px; color: rgba(180, 190, 255, 0.45); white-space: nowrap; min-width: 56px; }

      /* B: ウェルカムオーバーレイ */
      #welcome {
        display: none;
        position: fixed; inset: 0;
        align-items: center; justify-content: center;
        background: rgba(3, 3, 15, 0.7);
        backdrop-filter: blur(6px);
        z-index: 200;
        opacity: 1; transition: opacity 0.4s ease;
      }
      #welcome.hidden { opacity: 0; }
      #welcome-box {
        background: rgba(8, 8, 28, 0.95);
        border: 1px solid rgba(120, 140, 255, 0.3);
        border-radius: 20px; padding: 40px 48px;
        text-align: center; max-width: 420px;
        width: calc(100vw - 48px);
      }
      #welcome-title { font-size: 28px; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 20px; color: #e0e4ff; }
      #welcome-desc { font-size: 15px; line-height: 1.8; color: rgba(200, 210, 255, 0.8); margin-bottom: 12px; }
      #welcome-hint { font-size: 13px; line-height: 1.8; color: rgba(180, 190, 255, 0.5); margin-bottom: 32px; }
      #welcome-hint .dim { color: rgba(200, 210, 255, 0.75); font-style: italic; }
      #welcome-btn {
        background: rgba(120, 140, 255, 0.15);
        border: 1px solid rgba(120, 140, 255, 0.4);
        border-radius: 24px; padding: 10px 32px;
        color: #e0e4ff; font-size: 14px; cursor: pointer;
        font-family: inherit; letter-spacing: 0.05em;
        transition: background 0.2s, border-color 0.2s;
      }
      #welcome-btn:hover { background: rgba(120, 140, 255, 0.25); border-color: rgba(120, 140, 255, 0.6); }

    </style>
  </head>
  <body>
    <div id="loading">
      <div id="loading-text">
        <span>Loading Kanji-Verse...</span>
        <span id="loading-percent">0%</span>
      </div>
      <div id="loading-bar-track">
        <div id="loading-bar-fill"></div>
      </div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="search-bar">
      <input id="search-input" type="text" placeholder="🔍 kanji or meaning" autocomplete="off" />
      <span id="search-count"></span>
    </div>

    <div id="filter-bar">
      <button class="filter-btn active" data-type="joyo">
        <span class="dot" style="background:#c8d4ff"></span>Jōyō
      </button>
      <button class="filter-btn active" data-type="jinmei">
        <span class="dot" style="background:#ffd98e"></span>Jinmei
      </button>
    </div>

    <div id="detail-panel">
      <button id="detail-close">×</button>
      <div id="detail-kanji"></div>
      <div id="detail-type"></div>
      <div id="detail-readings">
        <div class="reading-group">
          <div class="reading-label">ON'YOMI</div>
          <div class="reading-value" id="detail-on"></div>
        </div>
        <div class="reading-group">
          <div class="reading-label">KUN'YOMI</div>
          <div class="reading-value" id="detail-kun"></div>
        </div>
      </div>
      <div id="detail-meanings"></div>
    </div>


    <div id="zoom-hint">Drag: rotate<br>Scroll: zoom</div>

    <!-- B: ウェルカムオーバーレイ（表示制御は main.ts で行う） -->
    <div id="welcome">
      <div id="welcome-box">
        <div id="welcome-title">Kanji-Verse</div>
        <p id="welcome-desc">~2,800 Japanese kanji arranged by meaning.<br>Similar concepts cluster together in space.</p>
        <p id="welcome-hint">
          Search by kanji <span class="dim">愛</span> or English <span class="dim">love</span><br>
          Click any star to see its readings and meaning.
        </p>
        <button id="welcome-btn">Explore →</button>
      </div>
    </div>

    <script type="module" src="/src/three-3d/main.ts"></script>
  </body>
</html>
